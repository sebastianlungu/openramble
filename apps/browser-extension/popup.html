<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniCaptain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f8f9fa;
    }
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .header .badge {
      font-size: 10px;
      background: #4361ee;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #4361ee;
      color: #fff;
    }
    .btn-primary:hover { background: #3a56d4; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-secondary {
      background: #e2e8f0;
      color: #1a1a2e;
    }
    .btn-secondary:hover { background: #cbd5e1; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      display: none;
    }
    .status.success {
      display: block;
      background: #c6f6d5;
      color: #22543d;
    }
    .status.error {
      display: block;
      background: #fed7d7;
      color: #742a2a;
    }
    .status.loading {
      display: block;
      background: #fefcbf;
      color: #744210;
    }
    .summary {
      background: #edf2f7;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      display: none;
    }
    .summary.visible { display: block; }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .summary-label { color: #718096; }
    .summary-value { font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <h1>OmniCaptain</h1>
    <span class="badge">context</span>
  </div>
  <div class="content">
    <button id="captureBtn" class="btn btn-primary">
      Capture Context
    </button>
    <button id="copyBtn" class="btn btn-secondary" disabled>
      Copy to Clipboard
    </button>
    <div id="status" class="status"></div>
    <div id="summary" class="summary">
      <div class="summary-item">
        <span class="summary-label">URL</span>
        <span id="summaryUrl" class="summary-value">-</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Console</span>
        <span id="summaryConsole" class="summary-value">-</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Errors</span>
        <span id="summaryErrors" class="summary-value">-</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
