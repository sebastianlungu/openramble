name: stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164dab6398 # v10.3.0
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. Remove the `stale` label
            or comment to keep it open. Otherwise it will close in 7 days.
          stale-pr-message: >
            This PR has been inactive for 60 days. Remove the `stale` label
            or comment to keep it open. Otherwise it will close in 7 days.
          close-issue-message: >
            This issue was closed due to inactivity.
          close-pr-message: >
            This PR was closed due to inactivity.
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: 'bug,enhancement'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
