name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - "src/**"
              - "apps/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"
              - ".github/workflows/**"

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-
      - run: bun install --frozen-lockfile
      - run: bunx oxlint .

  typecheck:
    name: typecheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-
      - run: bun install --frozen-lockfile
      - run: bun test

  pr-title:
    name: pr-title (conventional)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # require conventional commit type prefix, optional scope, optional !, then colon and subject
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            build
            ci
          requireScope: false
          # action strips the <type>(<scope>): prefix before checking the subject,
          # so this regex matches the subject body only. Require at least 3 chars
          # so a typo'd "wip" or empty body is rejected.
          subjectPattern: '^.{3,}$'
          subjectPatternError: |
            PR title subject is too short. Use at least 3 characters.
            Expected: <type>(<optional-scope>)<optional !>: <subject>
            Example: feat(compiler): add style-token gate
